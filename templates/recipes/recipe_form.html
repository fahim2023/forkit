{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    {% if recipe %}Edit Recipe{% else %}Add Recipe{% endif %} - ForkIt
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8">

        <h1 class="mb-4">
            {% if recipe %}Edit Recipe{% else %}Share a Recipe{% endif %}
        </h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    {% if recipe %}Update Recipe{% else %}Publish Recipe{% endif %}
                </button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
